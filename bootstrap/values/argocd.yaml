global:
  # Dominio global para acceder a Argo CD vía Ingress
  domain: argocd.welltrack.local

server:
  # Configuración del servicio del servidor de Argo CD
  service:
    type: ClusterIP

  # Configuración de Ingress para el servidor de Argo CD
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argocd.welltrack.local
    paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            port:
              name: http
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    tls:
      - hosts:
          - argocd.welltrack.local
        secretName: argocd-server-tls

  # 🔧 Importante: Desactivar redirección interna HTTPS de Argo CD
  extraArgs:
    - --insecure

# Configuración para el controlador ApplicationSet
applicationSet:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# Configuración para el Repo Server de Argo CD
repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
